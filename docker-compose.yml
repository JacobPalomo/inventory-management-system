version: '3.8'

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: inventory_api
      POSTGRES_PASSWORD: SFDsVIoKhE8aOlMjd2BJjKuyXlCnyGda
      POSTGRES_DB: inventory_db
    ports:
      - '5432:5432'

  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - db
    env_file:
      - .env.docker
    command: sh -c "sleep 5 && npx prisma migrate deploy && npx prisma db seed && node dist/app.js"
